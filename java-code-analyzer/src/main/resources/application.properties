# ═══════════════════════════════════════════════════════════════════════════
# Java Code Analyzer — Application Properties
# ═══════════════════════════════════════════════════════════════════════════

# ── Startup source (choose ONE; evaluated in priority order) ───────────────
#
# 1. Load model from the configured SQL database:
#      analyzer.startup.source=db
#      analyzer.startup.db-root=/absolute/path/to/project
#
# 2. Load model from a JSON snapshot file:
#      analyzer.model.path=/absolute/path/to/snapshot.json
#    (also honoured via env var JAVA_CODE_ANALYZER_MODEL or -Danalyzer.model.path=...)
#
# 3. Scan source tree at startup (default when neither of the above is set):
#      analyzer.project.root=/absolute/path/to/project
#    If not set either, the JVM working directory is scanned.

# Active startup source (uncomment one block):

# -- Option 1: database --
analyzer.startup.source=db
analyzer.startup.db-root=/Users/jcano/IdeaProjects/brewery

# -- Option 2: JSON snapshot --
# analyzer.model.path=/absolute/path/to/snapshot.json

# -- Option 3: source tree (default) --
# analyzer.project.root=/absolute/path/to/project

# ── Database (persist-model-db / load-model-db) ───────────────────────────
# Default: H2 file-based database written next to the working directory.
# The file is created automatically on first use.
# spring.datasource.url=jdbc:h2:file:./analyzer-model
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# Schema initialisation — safe to run on every startup (all DDL uses IF NOT EXISTS).
# spring.sql.init.mode=always
# spring.sql.init.schema-locations=classpath:db/schema.sql

# Optional: H2 web console at http://localhost:8080/h2-console
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.h2.console.settings.web-allow-others=false

# ── ChromaDB (persist-spring-chroma / query-chroma) ──────────────────────
# Vector database for semantic search over types and Spring beans.
# Default points to the Docker container started with:
#   docker start chromadb
# Override via env var CHROMA_URL or the property below.
analyzer.chroma.url=http://localhost:8001
# analyzer.chroma.tenant=default_tenant
# analyzer.chroma.database=default_database

# ── PostgreSQL (uncomment to switch) ──────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/analyzer
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=ariana
spring.sql.init.mode=never    # run java-code-analyzer/model-schema.sql manually first
