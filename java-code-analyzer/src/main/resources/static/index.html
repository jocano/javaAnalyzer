<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java Code Analyzer Web UI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; color: #222; }
    .row { display: flex; gap: 16px; align-items: flex-start; }
    .col { flex: 1; min-width: 0; }
    textarea { width: 100%; height: 72px; font-family: monospace; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 6px; white-space: pre-wrap; }
    button { padding: 8px 14px; cursor: pointer; }
    #svgPane { border: 1px solid #ddd; min-height: 300px; overflow: auto; padding: 10px; border-radius: 6px; }
    .muted { color: #666; font-size: 12px; }
    ul { margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Java Code Analyzer</h2>
  <p class="muted">Runs analyzer commands on the server's in-memory loaded model.</p>
  <div class="row">
    <div class="col">
      <label for="cmd"><strong>Command</strong></label>
      <textarea id="cmd">package-dependencies-diagram</textarea>
      <div style="margin-top:8px;">
        <button id="run">Run Command</button>
      </div>
      <h3>Output</h3>
      <pre id="output"></pre>
      <div class="muted" id="paths"></div>
      <h3>Available Commands</h3>
      <ul id="commands"></ul>
    </div>
    <div class="col">
      <h3>SVG Preview</h3>
      <div id="svgPane"><span class="muted">Run a diagram command to preview SVG.</span></div>
    </div>
  </div>
  <script>
    const out = document.getElementById("output");
    const paths = document.getElementById("paths");
    const svgPane = document.getElementById("svgPane");
    const cmd = document.getElementById("cmd");
    async function loadCommands() {
      const res = await fetch("/api/commands");
      const data = await res.json();
      const ul = document.getElementById("commands");
      ul.innerHTML = "";
      for (const c of data.commands || []) {
        const li = document.createElement("li");
        li.textContent = c;
        li.style.cursor = "pointer";
        li.onclick = () => cmd.value = c.replace(/ <.*$/, "");
        ul.appendChild(li);
      }
    }
    async function run() {
      out.textContent = "Running...";
      paths.textContent = "";
      svgPane.innerHTML = '<span class="muted">No SVG generated.</span>';
      const res = await fetch("/api/execute", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ command: cmd.value.trim() })
      });
      const data = await res.json();
      out.textContent = data.ok ? (data.output || "") : ("ERROR: " + (data.error || "Unknown"));
      if (data.pumlPath || data.svgPath) {
        paths.textContent = `PUML: ${data.pumlPath || "-"} | SVG: ${data.svgPath || "-"}`;
      }
      if (data.svgContent) {
        svgPane.innerHTML = data.svgContent;
      }
    }
    document.getElementById("run").onclick = run;
    loadCommands();
  </script>
</body>
</html>
