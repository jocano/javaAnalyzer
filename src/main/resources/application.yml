# Intercept all SQL (DataSource proxy). Set to false to disable.
sql:
  intercept:
    enabled: true

spring:
  application:
    name: spring-mvc-controller
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    driverClassName: org.postgresql.Driver
    username: postgres
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Recreate tables (drop + create) on every application startup
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

logging:
  level:
    com.example.springmvccontroller: DEBUG
    org.springframework.security: DEBUG
    # All intercepted SQL is logged at INFO by logger name SQL_INTERCEPT
    SQL_INTERCEPT: INFO

# Masking configuration
masking:
  fields:
    # Field name -> Mask function type mapping
    # Supported mask function types: PASSWORD_TYPE, EMAIL_TYPE, ROLE_TYPE
    # pasword: PASSWORD_TYPE
    # password: PASSWORD_TYPE (not used)
    pass: PASSWORD_TYPE
    passwrd: PASSWORD_TYPE
    passwrd_empl: PASSWORD_TYPE
    passwrd_empl_2: PASSWORD_TYPE
    passwrd_empl_3: PASSWORD_TYPE
    passwrd_empl_4: PASSWORD_TYPE
    email: EMAIL_TYPE
    # email: EMAIL_TYPE
    # email2: EMAIL_TYPE
    # email3: EMAIL_TYPE
    # email_empl: EMAIL_TYPE
    street: EMAIL_TYPE
    city: EMAIL_TYPE
    state: EMAIL_TYPE


