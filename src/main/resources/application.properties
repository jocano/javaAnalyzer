server.port=8080
spring.application.name=spring-mvc-controller

# Logging
logging.level.com.example.springmvccontroller=DEBUG
logging.level.org.springframework.security=DEBUG

# SQL interception (all statements logged via DataSource proxy). Set to false to disable.
sql.intercept.enabled=true

# Database configuration (PostgreSQL on localhost)
spring.datasource.url=jdbc:postgresql://localhost:5432/springmvc
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=password

# JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Recreate tables (drop + create) on every application startup
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
