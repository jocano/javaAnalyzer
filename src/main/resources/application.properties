server.port=8080
spring.application.name=spring-mvc-controller

# Logging
logging.level.com.example.springmvccontroller=DEBUG
logging.level.org.springframework.security=DEBUG

# SQL interception (all statements logged via DataSource proxy). Set to false to disable.
sql.intercept.enabled=true

# Database configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
