# ── Spring Component Analyzer — application configuration ────────────────────

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Couchbase ─────────────────────────────────────────────────────────────────
# Connection string for the Couchbase cluster (default: localhost)
spring.couchbase.connection-string=localhost

# Couchbase credentials
spring.couchbase.username=Administrator
spring.couchbase.password=ariana

# Bucket that holds the analyzer documents
spring.data.couchbase.bucket-name=java-analyzer

# Auto-creates the primary index on startup (handy for development)
# Disable in production and manage indexes via Couchbase Web Console
spring.data.couchbase.auto-index=true

# ── Spring Shell ──────────────────────────────────────────────────────────────
# The interactive shell starts automatically together with the web server.
# Type 'help' at the shell prompt to see available commands.
spring.shell.interactive.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example.sca=INFO
logging.level.org.springframework.data.couchbase=WARN
logging.level.com.couchbase=WARN
